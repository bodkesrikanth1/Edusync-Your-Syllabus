{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<section class="card auth-card">
  <h2>Admin Login</h2>

  <form method="post" class="form-stack">
    <label class="label-inline">Username</label>
    <input class="input" type="text" name="username" placeholder="admin" required>

    <label class="label-inline">Password</label>
    <input class="input" type="password" name="password" required>

    <button class="btn btn-primary" type="submit">Login as Admin</button>
  </form>

  <p class="muted" style="margin-top:10px">
    Default credentials: <strong>admin / admin</strong>
  </p>
</section>
{% endblock %}
